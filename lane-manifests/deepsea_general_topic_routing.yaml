lane_id: deepsea_general_topic_routing
workspace: /home/baine/openclaw/deepsea-general

allowed_packet_types:
  - topic_routing
  - remote_codex_intake
  - group_surface_planning

commands:
  validator:
    id: deepsea_general_boundary_files_present
    argv:
      - bash
      - -lc
      - cd /home/baine/openclaw/deepsea-general && test -f README.md && test -f TOPIC-ROUTING-RUNBOOK.md

