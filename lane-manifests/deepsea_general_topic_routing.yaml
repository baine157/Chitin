  - medical_or_credentialing_details
  - execution_without_GO_CODEX
  - any_external_action
  - authority_level_gt_2

canary:
  id: deepsea_general_boundary_files_canary
  command:
    - bash
    - -lc
    - cd /home/baine/openclaw/deepsea-general && test -f README.md && test -f TOPIC-ROUTING-RUNBOOK.md
  expected_statuses:
    - DONE
    - PARTIAL
    - BLOCKED
