  <title id="title">BearClaw Boba Mountain Dashboard Concept</title>
  <desc id="desc">A polished executive dashboard hero concept with chocolate lab Boba, playful BearClaw motifs, green mountain layers, and operational status panels.</desc>
  <defs>
