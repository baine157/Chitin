name: ci

on:
  push:
  pull_request:

jobs:
  durable-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Durable runner tests
        run: |
          cd durable-runner
          node --test tests/*.test.ts
      - name: Durable runner CLI help
        run: |
          cd durable-runner
          node src/cli.ts --help
